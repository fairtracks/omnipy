site_name: Omnipy
site_description: Omnipy is a type-driven Python library for data conversion, parsing and wrangling;
                  tool and web service interoperability; and scalable dataflow orchestration
repo_url: https://github.com/fairtracks/omnipy
site_url: https://omnipy.readthedocs.io/

exclude_docs: |
  /agents/
  /agents/**

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: omnipy
  logo: images/omnipy-puzzle-piece-logo-white.png
  favicon: images/favicon.png
#  icon:
#    annotation: material/arrow-right-circle
  features:
    - content.code.copy
    - content.code.annotation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - toc.integrate
    - toc.follow
extra_css:
  - https://cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/hack.css
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js
markdown_extensions:
#  - pymdownx.details
  - pymdownx.highlight:
      default_lang: python
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["docs"]
  - pymdownx.superfences
  - pymdownx.blocks.html
#  - pymdownx.blocks.tab
  - mdx_truly_sane_lists
  - callouts
#  - attr_list
#  - md_in_html
#  - footnotes

nav:
  - Start here:
      - Home: index.md
      - Install: start/install.md
      - 10-minute Quickstart: start/quickstart.md
      - Concepts: start/concepts.md
  - Tutorials:
      - '01. Interactive safety': tutorials/01-interactive-safety.md
      - '02. Nested JSON to tables': tutorials/02-json-to-tables.md
      - '03. Batch processing with Dataset': tutorials/03-dataset-batch.md
      - '04. Build a dataflow (Task → Flow → Engine) (stub)': tutorials/04-compute-dataflow.md
      - '05. Domain tabular formats (stub)': tutorials/05-domain-formats.md
      - '06. Resilient API fetching (stub)': tutorials/06-resilient-api.md
      - '07. AI-safe boundaries (stub)': tutorials/07-ai-boundaries.md
      - '08. Orchestrate with Prefect (stub)': tutorials/08-prefect-scale.md
  - How-to Guides:
      - Models:
          - define-models: howto/models/define-models.md
          - parse-strategies: howto/models/parse-strategies.md
          - conversions: howto/models/conversions.md
          - display-inspection: howto/models/display-inspection.md
          - chainx: howto/models/chainx.md
          - parametrized-models: howto/models/parametrized-models.md
          - complex-models: howto/models/complex-models.md
      - Datasets:
          - basics: howto/datasets/basics.md
          - hierarchies-blueprints: howto/datasets/hierarchies-blueprints.md
          - serialization: howto/datasets/serialization.md
      - Dataflows:
          - tasks: howto/dataflows/tasks.md
          - flows: howto/dataflows/flows.md
          - running-flows: howto/dataflows/running-flows.md
          - modifiers: howto/dataflows/modifiers.md
          - mapping-over-datasets: howto/dataflows/mapping-over-datasets.md
          - engines-overview: howto/dataflows/engines-overview.md
      - Components:
          - catalog: howto/components/catalog.md
          - json: howto/components/json.md
          - tables: howto/components/tables.md
          - remote: howto/components/remote.md
          - domain-formats: howto/components/domain-formats.md
  - Feature Overview:
      - continuous-validation: features/continuous-validation.md
      - snapshots-rollbacks: features/snapshots-rollbacks.md
      - declarative-conversions: features/conversions.md
      - dataset-batch-hierarchies: features/datasets.md
      - display-visualization: features/display.md
      - components-catalog: features/components-catalog.md
      - engines-orchestration: features/engines.md
  - Learn:
      - mental-model: learn/mental-model.md
      - parse-dont-validate: parse_dont_validate.md
      - python-typing: python_typing.md
      - comparisons: learn/comparisons.md
  - Reference:
      - configuration: reference/configuration.md
      - glossary: reference/glossary.md
      - faq: reference/faq.md
  - Contributing:
      - contributing: contributing.md
      - docs-guide: contributing/docs-guide.md
  - Release notes: release_notes.md
  - Code Reference: reference/

watch:
  - src

plugins:
- search
- gen-files:
    scripts:
    - docs/gen_ref_pages.py
- literate-nav:
    nav_file: SUMMARY.md
- section-index
- markdown-exec
- mkdocstrings:
    handlers:
      python:
        paths: [ src ]
        import:
        - https://docs.pydantic.dev/latest/objects.inv
        options:
          allow_inspection: false
          backlinks: true
          extensions:
            - omnipy.util.griffe_extension:UseDynamicSignatureForSpecificFunctions:
                functions:
                  - omnipy.data._mixins.display.BaseDisplayMixin.peek
                  - omnipy.data._mixins.display.BaseDisplayMixin.full
                  - omnipy.data._mixins.display.BaseDisplayMixin.json
                  - omnipy.data._mixins.display.BaseDisplayMixin.browse
                  - omnipy.data._mixins.display.DatasetDisplayMixin.list
          inheritance_diagram_direction: BT
          preload_modules:
          - pydantic
          show_inheritance_diagram: true
          heading_level: 1
          show_root_heading: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          filters:
            - "!^_"
            - "__init__"
            - "!^__all__"
            - "!^pyd"
          summary: true
          docstring_style: google
          docstring_options:
            returns_multiple_items: false
          docstring_section_style: spacy
          show_if_no_docstring: true
          annotations_path: source
          line_length: 100
          modernize_annotations: true
          show_overloads: true
          overloads_only: true
          show_signature_annotations: true
          separate_signature: true
          signature_crossrefs: true
