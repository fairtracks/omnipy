      - '03. Batch processing with Dataset': tutorials/03-dataset-batch.md
      - '04. Build a dataflow (Task → Flow → Engine)': tutorials/04-compute-dataflow.md
      - '05. Domain tabular formats (e.g. BED/GFF) via model specs': tutorials/05-domain-formats.md
      - '06. Resilient API fetching': tutorials/06-resilient-api.md
      - '07. AI-safe boundaries': tutorials/07-ai-boundaries.md
      - '08. Orchestrate with Prefect (scale-up path)': tutorials/08-prefect-scale.md
  - How-to guides:
      - Models:
          - Define Models: howto/models/define-models.md
          - Parse strategies: howto/models/parse-strategies.md
          - Conversions with .to(): howto/models/conversions.md
          - Display and inspection: howto/models/display-inspection.md
          - ChainX recipes: howto/models/chainx.md
          - Parametrized models: howto/models/parametrized-models.md
          - Complex models: howto/models/complex-models.md
      - Datasets:
          - Dataset basics: howto/datasets/basics.md
          - Hierarchies & blueprints: howto/datasets/hierarchies-blueprints.md
          - Serialization & persistence: howto/datasets/serialization.md
      - Dataflows (Compute):
          - Tasks: howto/dataflows/tasks.md
          - Flows: howto/dataflows/flows.md
          - Running flows: howto/dataflows/running-flows.md
          - Modifiers: howto/dataflows/modifiers.md
          - Mapping Tasks/Flows over Datasets: howto/dataflows/mapping-over-datasets.md
          - Engines overview: howto/dataflows/engines-overview.md
      - Components:
          - Components catalog: howto/components/catalog.md
          - JSON component: howto/components/json.md
          - Tables component: howto/components/tables.md
          - Remote component: howto/components/remote.md
          - Domain formats component: howto/components/domain-formats.md
  - Feature overview:
      - Continuous validation & type mimicking: features/continuous-validation.md
      - Snapshots & rollbacks: features/snapshots-rollbacks.md
      - Declarative conversions (.to()): features/conversions.md
      - Dataset batch + hierarchies: features/datasets.md
      - 'Dataflows (Compute): Tasks/Flows/Modifiers': features/compute-dataflows.md
      - Display & visualization: features/display.md
      - Components catalog (General/JSON/Remote/Tables/etc.): features/components-catalog.md
      - Engines (local + Prefect integration): features/engines.md
      - 'Tabular schemas: Omnipy vs Pandera (Preview)': features/tabular-schemas-vs-pandera.md
  - Learn:
      - Omnipy mental model (Model/Dataset/Task/Flow): learn/mental-model.md
      - "Parse, don't validate": learn/parse-dont-validate.md
      - Python typing: learn/python-typing.md
      - Positioning & comparisons: learn/comparisons.md
      - Visual metaphors and story mode (Planned): learn/visual-metaphors-story-mode.md
  - Reference:
      - Configuration: reference/configuration.md
      - Glossary: reference/glossary.md
      - FAQ / Troubleshooting: reference/faq.md
  - Contributing:
      - Contributing: contributing.md
      - Documentation contribution: contributing/docs-guide.md
  - Release notes: release_notes.md
  - Code Reference: reference/

watch:
  - src

plugins:
- search
- gen-files:
    scripts:
    - docs/gen_ref_pages.py
- literate-nav:
    nav_file: SUMMARY.md
- section-index
- markdown-exec
- mkdocstrings:
    handlers:
      python:
        paths: [ src ]
        import:
        - https://docs.pydantic.dev/latest/objects.inv
        options:
          allow_inspection: false
          backlinks: true
          extensions:
            - omnipy.util.griffe_extension:UseDynamicSignatureForSpecificFunctions:
                functions:
                  - omnipy.data._mixins.display.BaseDisplayMixin.peek
                  - omnipy.data._mixins.display.BaseDisplayMixin.full
                  - omnipy.data._mixins.display.BaseDisplayMixin.json
                  - omnipy.data._mixins.display.BaseDisplayMixin.browse
                  - omnipy.data._mixins.display.DatasetDisplayMixin.list
          inheritance_diagram_direction: BT
          preload_modules:
          - pydantic
          show_inheritance_diagram: true
          heading_level: 1
          show_root_heading: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          filters:
            - "!^_"
            - "__init__"
            - "!^__all__"
            - "!^pyd"
          summary: true
          docstring_style: google
          docstring_options:
            returns_multiple_items: false
          docstring_section_style: spacy
          show_if_no_docstring: true
          annotations_path: source
          line_length: 100
          modernize_annotations: true
          show_overloads: true
          overloads_only: true
          show_signature_annotations: true
          separate_signature: true
          signature_crossrefs: true
